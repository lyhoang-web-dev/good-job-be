# Render Blueprint — Good Job API
# Docs: https://render.com/docs/blueprint-spec
# Usage: Render dashboard -> New -> Blueprint -> connect this repo.
# Secret values (sync: false) are entered in the dashboard on first deploy.
services:
  - type: web
    name: good-job-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: singapore          # closest free region to Vietnam; change if needed
    healthCheckPath: /api/health
    autoDeploy: true            # deploy on push to the connected branch
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true     # Render generates once and keeps it
      - key: DATABASE_URL       # Neon connection string
        sync: false
      - key: REDIS_URL          # Upstash rediss:// URL
        sync: false
      - key: CORS_ORIGIN        # https://<your-frontend>.vercel.app
        sync: false
      - key: FE_URL             # https://<your-frontend>.vercel.app
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL # https://<your-api>.onrender.com/api/auth/google/callback
        sync: false
# Note: PORT is injected by Render automatically; the app reads process.env.PORT.
# Migrations are NOT run here — run `prisma migrate deploy` from your machine
# against the database. The production image has no Prisma CLI.
